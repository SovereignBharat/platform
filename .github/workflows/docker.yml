name: Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'services/**/Dockerfile'
      - '.github/workflows/docker.yml'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - control-plane
          - gateway
          - iam

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t sovereignbharat/${{ matrix.service }}:latest services/${{ matrix.service }}
