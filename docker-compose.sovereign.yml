version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: sovereign
      POSTGRES_DB: sovereignbharat
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  qdrant:
    image: qdrant/qdrant
    ports:
      - '6333:6333'

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: sovereign
      MINIO_ROOT_PASSWORD: sovereign123
    ports:
      - '9000:9000'
