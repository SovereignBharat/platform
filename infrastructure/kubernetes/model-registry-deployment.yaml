apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-registry
  namespace: sovereignbharat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-registry
  template:
    metadata:
      labels:
        app: model-registry
    spec:
      containers:
        - name: model-registry
          image: sovereignbharat/model-registry:latest
          ports:
            - containerPort: 8084
