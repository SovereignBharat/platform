apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-engine
  namespace: sovereignbharat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-engine
  template:
    metadata:
      labels:
        app: policy-engine
    spec:
      containers:
        - name: policy-engine
          image: sovereignbharat/policy-engine:latest
          ports:
            - containerPort: 8085
