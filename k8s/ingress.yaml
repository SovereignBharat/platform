apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openstack-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: cloud.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: openstack-dashboard
            port:
              number: 80
  - host: api.cloud.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: openstack-api
            port:
              number: 5000